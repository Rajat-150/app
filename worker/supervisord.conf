[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log

[program:xvfb]
command=Xvfb :99 -screen 0 1440x900x24 -ac +extension GLX +render -noreset
autorestart=true
priority=1
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb.err

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":99"
autorestart=true
priority=2
stdout_logfile=/var/log/fluxbox.log
stderr_logfile=/var/log/fluxbox.err

[program:x11vnc]
command=x11vnc -display :99 -forever -shared -rfbport 5900 -nopw -bg -o /var/log/x11vnc.log
autorestart=true
priority=3
stdout_logfile=/var/log/x11vnc-sup.log
stderr_logfile=/var/log/x11vnc-sup.err

[program:novnc]
command=websockify --web=/usr/share/novnc/ 6080 localhost:5900
autorestart=true
priority=4
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc.err

[program:worker]
command=uvicorn app:app --host 0.0.0.0 --port 8002
directory=/app
autorestart=true
priority=5
environment=DISPLAY=":99",PYTHONUNBUFFERED="1"
stdout_logfile=/var/log/worker.log
stderr_logfile=/var/log/worker.err
